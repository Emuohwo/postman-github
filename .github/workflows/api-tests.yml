name: API Automation Tests

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

  workflow_dispatch:

  schedule:
    - cron: "0 6 * * *"

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Newman
        run: |
          npm install -g newman
          npm install -g newman-reporter-json
          npm install -g newman-reporter-htmlextra

      - name: Execute Postman Collection
        run: |
          mkdir -p reports

          newman run postman/BookingAPI.postman_collection.json \
            --env-var "fname=${{ secrets.FNAME }}" \
            --env-var "lname=${{ secrets.LNAME }}" \
            --env-var "username=${{ secrets.USERNAME }}" \
            --env-var "password=${{ secrets.PASSWORD }}" \
            --env-var "base_url=${{ secrets.BASE_URL }}" \
            -r cli,json,htmlextra \
            --reporter-json-export reports/newman-report.json \
            --reporter-htmlextra-export reports/newman-report.html

      - name: Generate Execution Summary
        run: |
          node <<'EOF'
          const fs = require('fs');

          const report = JSON.parse(
            fs.readFileSync('reports/newman-report.json', 'utf8')
          );

          let passed = 0;
          let failed = 0;

          report.run.executions.forEach(exec => {
            (exec.assertions || []).forEach(assertion => {
              if (assertion.error) {
                failed++;
              } else {
                passed++;
              }
            });
          });

          const totalAssertions = passed + failed;
          const totalRequests = report.run.stats.requests.total;
          const duration =
            (report.run.timings.completed - report.run.timings.started) / 1000;

          const passRate =
            totalAssertions === 0
              ? 0
              : (passed / totalAssertions) * 100;

          const status = failed === 0 ? "PASSED ✅" : "FAILED ❌";

          console.log("=======================================");
          console.log("API TEST EXECUTION SUMMARY");
          console.log("=======================================");
          console.log(`Status           : ${status}`);
          console.log(`Duration         : ${duration.toFixed(2)}s`);
          console.log(`Total Requests   : ${totalRequests}`);
          console.log(`Total Assertions : ${totalAssertions}`);
          console.log(`Passed           : ${passed}`);
          console.log(`Failed           : ${failed}`);
          console.log(`Pass Percentage  : ${passRate.toFixed(2)}%`);
          console.log("=======================================");

          const summary = `
          ## API Test Execution Summary

          | Metric | Result |
          |--------|--------|
          | Status | ${status} |
          | Duration | ${duration.toFixed(2)}s |
          | Total Requests | ${totalRequests} |
          | Total Assertions | ${totalAssertions} |
          | ✅ Passed | ${passed} |
          | ❌ Failed | ${failed} |
          | 📊 Pass Rate | ${passRate.toFixed(2)}% |
          `;

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, summary);

          const markdown = `# Newman Test Report

          | Metric | Value |
          |--------|-------|
          | Status | ${status} |
          | Duration | ${duration.toFixed(2)}s |
          | Total Requests | ${totalRequests} |
          | Total Assertions | ${totalAssertions} |
          | Passed | ${passed} |
          | Failed | ${failed} |
          | Pass Rate | ${passRate.toFixed(2)}% |

          ${failed === 0
            ? "✅ All tests passed successfully."
            : "❌ Some tests failed. Check the HTML report for details."}
          `;

          fs.writeFileSync("reports/latest-report.md", markdown);

          if (passRate < 90) {
            console.error(
              `Pass rate ${passRate.toFixed(2)}% is below the required 90%.`
            );
            process.exit(1);
          }

          console.log("✔ Quality gate passed.");
          EOF

      - name: Upload Newman Reports
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: |
            reports/newman-report.json
            reports/newman-report.html
            reports/latest-report.md

      - name: Commit Markdown Report
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p reports

          git add reports/latest-report.md
          git commit -m "Update Newman report [skip ci]" || echo "No changes to commit"
          git push